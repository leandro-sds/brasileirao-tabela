name: Atualizar Tabela Brasileirão

on:
  schedule:
    # Roda a cada 30 minutos
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Permite rodar manualmente pelo painel do GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar scraper
        run: python scraper.py

      - name: Commit e push do JSON atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "tabela: atualização automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
